mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN

proxies:
  # 在此添加你的代理节点

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - �🇵 日本节点
      - DIRECT

  - name: 🤖 AI服务
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🚀 节点选择
      - DIRECT

  - name: 🔍 Google
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - 🚀 节点选择
      - DIRECT

  - name: 🎬 流媒体
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点

  - name: 💬 社交媒体
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🇭🇰 香港节点
      - 🚀 节点选择

  - name: 👨‍💻 开发者
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - 🚀 节点选择
      - DIRECT

  - name: 🪟 Microsoft
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 📚 学术研究
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🚀 节点选择
      - DIRECT

  - name: 🌐 社区
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇸🇬 新加坡节点
      - 🚀 节点选择
      - DIRECT

  - name: 🇺🇸 美国节点
    type: url-test
    proxies: []
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇭🇰 香港节点
    type: url-test
    proxies: []
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇰🇷 韩国节点
    type: url-test
    proxies: []
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇸🇬 新加坡节点
    type: url-test
    proxies: []
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇯🇵 日本节点
    type: url-test
    proxies: []
    url: http://www.gstatic.com/generate_204
    interval: 300

